name: Release

on:
  push:
    branches: [release]

permissions:
  contents: write
  id-token: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - run: nix develop --command just install
      - run: nix develop --command just build

      - run: cp src-tauri/target/release/wisp wisp-linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: wisp-linux-x64
          path: wisp-linux-x64

  build-macos:
    runs-on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: "10.15"
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Write Apple API key to disk
        run: echo "${{ secrets.APPLE_API_KEY }}" > /tmp/AuthKey.p8
      - run: nix develop --command just install
      - name: Build and sign
        run: >-
          nix develop --command env
          APPLE_CERTIFICATE="$APPLE_CERTIFICATE"
          APPLE_CERTIFICATE_PASSWORD="$APPLE_CERTIFICATE_PASSWORD"
          APPLE_SIGNING_IDENTITY="$APPLE_SIGNING_IDENTITY"
          APPLE_API_ISSUER="$APPLE_API_ISSUER"
          APPLE_API_KEY="$APPLE_API_KEY"
          APPLE_API_KEY_PATH="$APPLE_API_KEY_PATH"
          just build
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: /tmp/AuthKey.p8
      - run: cp src-tauri/target/release/wisp wisp-macos-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: wisp-macos-arm64
          path: wisp-macos-arm64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v2
      - uses: oven-sh/setup-bun@v2
      - run: just install ci
      - name: Set VULKAN_SDK
        shell: pwsh
        run: |
          $vulkan = Get-ChildItem C:\VulkanSDK -Directory | Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty FullName
          echo "VULKAN_SDK=$vulkan" >> $env:GITHUB_ENV
      - run: just build

      - run: Copy-Item "C:\wisp\release\wisp.exe" "wisp-windows-x64.exe"

      - name: Sign binary
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          code-signing-account-name: josephembrey
          certificate-profile-name: josephembrey
          files-folder: ${{ github.workspace }}
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - uses: actions/upload-artifact@v4
        with:
          name: wisp-windows-x64
          path: wisp-windows-x64.exe


  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          version=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - run: ls -lR artifacts

      - name: Extract release notes
        run: |
          awk "/^## ${{ steps.version.outputs.version }}/{found=1; next} /^## /{if(found) exit} found" CHANGELOG.md > notes.md
          cat notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.version.outputs.tag }} \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file notes.md \
            --target release \
            artifacts/*
